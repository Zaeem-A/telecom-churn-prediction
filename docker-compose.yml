version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://churn:churn@db:5432/churndb
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: churn
      POSTGRES_PASSWORD: churn
      POSTGRES_DB: churndb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

volumes:
  pgdata:
